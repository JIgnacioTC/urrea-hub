services:
  postgres:
    image: postgres:16-alpine
    container_name: urrea-hub-postgres
    environment:
      POSTGRES_USER: urreahub
      POSTGRES_PASSWORD: "UrreaHub2026!"
      POSTGRES_DB: UrreaHub
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U urreahub -d UrreaHub"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

volumes:
  postgres_data:
