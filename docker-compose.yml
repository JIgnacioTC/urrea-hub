services:
  sqlserver:
    image: mcr.microsoft.com/azure-sql-edge:latest
    container_name: urrea-hub-sql
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "UrreaHub2026!"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "pidof sqlservr > /dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 30s

volumes:
  sqlserver_data:
